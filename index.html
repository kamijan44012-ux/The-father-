<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noon Electronics UAE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">noon <span>Electronics</span></div>
        <div class="search-bar">
            <input type="text" placeholder="What are you looking for in UAE?">
        </div>
        <div class="header-buttons">
            <button id="adminBtn">Admin Panel</button>
            <div class="cart">🛒 Cart (<span id="cartCount">0</span>)</div>
        </div>
    </header>

    <div class="banner">
        <h1>Exclusive Electronics Deals in Dubai & Abu Dhabi</h1>
        <p>Up to 50% OFF on Smartphones, Laptops, and Accessories</p>
    </div>

    <main>
        <section id="customerView">
            <h2 class="section-title">Trending Products (AED)</h2>
            <div class="products-grid" id="productsGrid">
                </div>
        </section>

        <section id="adminPanel" class="hidden">
            <div class="admin-header">
                <h2>Admin Dashboard</h2>
                <button id="logoutBtn">Logout</button>
            </div>
            
            <div class="admin-box">
                <h3>Add New Product</h3>
                <form id="addProductForm">
                    <input type="text" id="prodName" placeholder="Product Name" required>
                    <input type="number" id="prodPrice" placeholder="Price in AED" required>
                    <textarea id="prodImages" placeholder="Images URLs (Paste multiple links separated by comma ',')" rows="3" required></textarea>
                    <input type="url" id="prodVideo" placeholder="Video URL (Google Drive or YouTube Link - Optional)">
                    <button type="submit">Upload Product</button>
                </form>
            </div>

            <div class="admin-box">
                <h3>Manage Existing Products</h3>
                <div id="adminProductsList"></div>
            </div>
        </section>
    </main>

    <div id="loginModal" class="modal hidden">
        <div class="modal-content">
            <h3>Admin Login</h3>
            <p>Enter password to access dashboard:</p>
            <input type="password" id="adminPassword" placeholder="Enter Password">
            <div class="modal-actions">
                <button id="loginSubmit">Login</button>
                <button id="loginClose">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
